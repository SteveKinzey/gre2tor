<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GRE2Tor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="site-header">
    <nav class="nav wrap" aria-label="Primary navigation">
      <a class="brand" href="{{ url_for('index') }}">GRE2Tor</a>
      <div class="nav-links">
        <a href="{{ url_for('topics') }}">Topics</a>
        <a href="{{ url_for('quiz') }}">Study All</a>
        <a href="{{ url_for('review') }}">Review</a>
      </div>
    </nav>
  </header>

  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>

  <footer class="wrap footer">
    <span>Local GRE math flashcards. Progress is stored in SQLite.</span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
